<!DOCTYPE html>
<html>
<head>
<title>Plant Disease Detection</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#e8f5e9;
padding:30px;
}
.box{
background:white;
padding:30px;
border-radius:15px;
display:inline-block;
box-shadow:0 0 10px gray;
}
button{
padding:10px 20px;
background:green;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
img{
margin-top:15px;
border-radius:10px;
}
</style>
</head>
<body>
<div class="box">
<h1>🌿 Plant Disease Detection</h1>

<form method="POST" enctype="multipart/form-data">
<input type="file" name="image" required><br><br>
<button type="submit">Predict</button>
</form>

{% if result %}
<h2>{{ result }}</h2>
<h3>{{ confidence }}%</h3>
<img src="{{ image }}" width="250">
{% endif %}

</div>
</body>
</html>
